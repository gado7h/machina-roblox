name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    env:
      BUILD_OUTPUT: ${{ runner.temp }}/MachinaLab.rbxlx

    steps:
      - name: Checkout
        uses: actions/checkout@v5
          
      - name: Setup Rokit
        uses: CompeyDev/setup-rokit@v0.1.2
        with:
          cache: true

      - name: Install toolchain
        run: rokit install --no-trust-check

      - name: Verify tools
        run: |
          rokit --version
          rojo --version
          selene --version
          stylua --version

      - name: Lint with Selene
        run: selene src
        continue-on-error: true

      - name: Check formatting with StyLua
        run: stylua --check src
        continue-on-error: true
        
      - name: Build place
        run: rojo build default.project.json -o "$BUILD_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: machinalab-build
          path: ${{ env.BUILD_OUTPUT }}
